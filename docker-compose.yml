version: '3.9'

services:
  postgres-inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - inventory_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-billing:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - billing_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d billing"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-service:
    build: ./inventory-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: "host=postgres-inventory port=5432 user=postgres password=postgres dbname=inventory sslmode=disable"
      PORT: "8081"
    depends_on:
      postgres-inventory:
        condition: service_healthy
    restart: on-failure

  billing-service:
    build: ./billing-service
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: "host=postgres-billing port=5432 user=postgres password=postgres dbname=billing sslmode=disable"
      INVENTORY_URL: "http://inventory-service:8081"
      PORT: "8082"
    depends_on:
      postgres-billing:
        condition: service_healthy
      inventory-service:
        condition: service_started
    restart: on-failure

volumes:
  inventory_data:
  billing_data:
